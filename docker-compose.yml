version: '3.8'

services:

  app:
    build: ./docker/php
    container_name: jp_app
    volumes:
      - .:/var/www/html
    ports:
      - "8080:80"
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html/public
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: jp_db
    restart: always
    environment:
      MYSQL_DATABASE: jp_preparation
      MYSQL_ROOT_PASSWORD: Qwaszx12345_
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: jp_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db

volumes:
  dbdata: